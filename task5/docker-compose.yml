version: '3.8'

services:
  webserver:
    build: .
    container_name: webserver
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ENV_SERVER_NAME=${DOMAIN_NAME}
    volumes:
      - certbot_etc:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - frontend_net
      - backend_net

  certbot:
    image: certbot/certbot:v2.8.0
    container_name: certbot
    restart: always
    volumes:
      - certbot_etc:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      apk add --no-cache docker-cli;
      if [ ! -d /etc/letsencrypt/live/$${DOMAIN_NAME} ] || [ ! -f /etc/letsencrypt/live/$${DOMAIN_NAME}/fullchain.pem ]; then
        certbot certonly --webroot -w /var/www/certbot --non-interactive --agree-tos --email admin@$${DOMAIN_NAME} -d $${DOMAIN_NAME};
        docker exec webserver nginx -s reload;
      fi;
      while :; do 
        certbot renew --deploy-hook 'docker exec webserver nginx -s reload'; 
        sleep 12h & wait $${!}; 
      done;"

  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_net

  node_exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    ports:
      - "9100:9100"
    networks:
      - frontend_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - frontend_net

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres_db:5432/${DB_NAME}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - backend_net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - frontend_net

  browserstack_local:
    image: browserstack/local:latest
    container_name: browserstack_local
    restart: always
    environment:
      - BROWSERSTACK_ACCESS_KEY=${BROWSERSTACK_ACCESS_KEY}
    command: 
      - --key
      - ${BROWSERSTACK_ACCESS_KEY}
      - --local-proxy-host
      - webserver
      - --force-local
      - --tunnel-identifier
      - ${ENVIRONMENT_NAME}
    networks:
      - frontend_net

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  pgdata:
  certbot_etc: